name: Deploy Library to VPS Repo

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache Gradle Dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches/modules-2/
          ~/.gradle/wrapper/dists/
        key: gradle-dependencies-static
        restore-keys: |
          gradle-dependencies-static

    - name: Publish locally
      run: ./gradlew publish

    - name: Cleanup Gradle Cache
      run: |
        rm -f ~/.gradle/caches/modules-2/modules-2.lock
        rm -fr ~/.gradle/caches/*/plugin-resolution/
        rm -fr ~/.gradle/daemon/

    - name: Deploy to VPS via rsync
      uses: AEnterprise/rsync-deploy@v1.0.2
      env:
        DEPLOY_KEY: ${{ secrets.VPS_SSH_KEY }}
        USERNAME: ${{ secrets.VPS_SSH_USER }}
        ARGS: "-avz"
        SERVER_PORT: "22"
        FOLDER: "build/repo/"
        SERVER_IP: 144.31.239.101
        SERVER_DESTINATION: "/var/www/maven-repo/"
        SSH_KNOWN_HOSTS: "144.31.239.101 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBLdSp9g8YNV4T5YpzlCdWQj/qbj9HY2PcPkyPGqFXWH"
