name: Build and Deploy via Registry

on:
  workflow_call:
    inputs:
      SERVICE_NAME:
        required: true
        type: string
      DOCKERFILE_PATH:
        required: false
        type: string
        default: "./Dockerfile"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Registry
      uses: docker/login-action@v4
      with:
        registry: elysium-registry.mcbeeland.ru
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    - name: Build and Push
      id: build
      run: |
        IMAGE_TAG="elysium-registry.mcbeeland.ru/${{ inputs.SERVICE_NAME }}:latest"
        docker build -f "${{ inputs.DOCKERFILE_PATH }}" -t "$IMAGE_TAG" .
        docker push "$IMAGE_TAG"

